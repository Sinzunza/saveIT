<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Home/Spending Section -->
  <div id="home-container">
    <header>
        <span id="home-tab">MoreDough</span>
    </header>
    <main id="home-page">
      <h2>Income</h2>
      <input type="number" id="amount-input" placeholder="Enter amount">
      <button id="homeAdd">Add Check</button>
    </main>
    <main id="spending-page">
      <h2>Spending</h2>
      <input type="date" id="calendar" min="" max="">
	  <input type="text" id="spendName" placeholder="Enter name">
	  <input type="number" id="spendNumber" placeholder="Enter amount">
      <button id="spendAdd">Add Spending</button>
    </main>
  </div>

  <script>

    // Calendar date bounds
    const calendar = document.getElementById("calendar");
    const today = new Date();
    const twoWeeks = new Date(today.getDate()+14);

    calendar.min = today.toISOString().split("T")[0];
    calendar.max = twoWeeks.toISOString().split("T")[0];
    
  </script>
</body>
</html>
